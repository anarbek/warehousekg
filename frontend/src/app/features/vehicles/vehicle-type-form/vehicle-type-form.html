<div class="form-page">
  <h1>{{ isEdit ? 'Изменить тип транспорта' : 'Новый тип транспорта' }}</h1>
  <dx-form [formData]="formData" [colCount]="1">
    <dxi-item dataField="code" editorType="dxTextBox" [editorOptions]="{ placeholder: 'Код' }">
      <dxi-validation-rule type="required" />
    </dxi-item>
    <dxi-item dataField="name" editorType="dxTextBox" [editorOptions]="{ placeholder: 'Название' }">
      <dxi-validation-rule type="required" />
    </dxi-item>
    <dxi-item dataField="description" editorType="dxTextBox" [editorOptions]="{ placeholder: 'Описание' }" />
    <dxi-item dataField="defaultCapacityKg" editorType="dxNumberBox" [editorOptions]="{ placeholder: 'Грузоподъёмность (кг)', format: '#,##0.###' }" />
    <dxi-item dataField="defaultCapacityM3" editorType="dxNumberBox" [editorOptions]="{ placeholder: 'Объём кузова (м³)', format: '#,##0.###' }" />
    <dxi-item dataField="isActive" editorType="dxSwitch" [editorOptions]="{ switchedOnText: 'Активен', switchedOffText: 'Неактивен' }" />
  </dx-form>
  <div class="form-page__actions">
    <dx-button text="Сохранить" icon="check" type="default" stylingMode="contained" (onClick)="submit()" [disabled]="loading()" />
    <dx-button text="Отмена" stylingMode="outlined" [routerLink]="['/vehicles/types']" />
  </div>
</div>
