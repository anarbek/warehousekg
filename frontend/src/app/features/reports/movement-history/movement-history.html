<div class="list-page"><div class="list-page__toolbar"><h1 i18n="@@rpt.movements.title">История движений</h1></div>@if(loading()){<mat-progress-bar mode="indeterminate" class="list-page__progress"/>}@if(error()){<p class="list-page__error">{{error()}}</p>}<div class="table-container mat-elevation-z2"><table mat-table [dataSource]="ds" matSort><ng-container matColumnDef="operation"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.movements.op">Операция</th><td mat-cell *matCellDef="let r">{{r.operation}}</td></ng-container><ng-container matColumnDef="draft"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.movements.draft">Черновик</th><td mat-cell *matCellDef="let r">{{r.draft}}</td></ng-container><ng-container matColumnDef="completed"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.movements.completed">Завершено</th><td mat-cell *matCellDef="let r">{{r.completed}}</td></ng-container><ng-container matColumnDef="cancelled"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.movements.cancelled">Отменено</th><td mat-cell *matCellDef="let r">{{r.cancelled}}</td></ng-container><ng-container matColumnDef="total"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.movements.total">Всего</th><td mat-cell *matCellDef="let r">{{r.total}}</td></ng-container><tr mat-header-row *matHeaderRowDef="cols"></tr><tr mat-row *matRowDef="let r; columns: cols"></tr><tr class="mat-row" *matNoDataRow><td class="mat-cell table-empty" [attr.colspan]="cols.length" i18n="@@common.noData">Нет данных</td></tr></table><mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons/></div></div>
