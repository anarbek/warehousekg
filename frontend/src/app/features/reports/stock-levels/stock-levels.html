<div class="list-page"><div class="list-page__toolbar"><h1 i18n="@@rpt.lowStock.title">Товары ниже мин. запаса</h1></div>@if(loading()){<mat-progress-bar mode="indeterminate" class="list-page__progress"/>}@if(error()){<p class="list-page__error">{{error()}}</p>}<div class="table-container mat-elevation-z2"><table mat-table [dataSource]="ds" matSort><ng-container matColumnDef="sku"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.lowStock.sku">Артикул</th><td mat-cell *matCellDef="let r">{{r.sku}}</td></ng-container><ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.lowStock.name">Название</th><td mat-cell *matCellDef="let r">{{r.name}}</td></ng-container><ng-container matColumnDef="quantityOnHand"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.lowStock.qty">Кол-во</th><td mat-cell *matCellDef="let r">{{r.quantityOnHand|number:'1.3-3'}}</td></ng-container><ng-container matColumnDef="reorderLevel"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.lowStock.reorder">Мин. запас</th><td mat-cell *matCellDef="let r">{{r.reorderLevel|number:'1.3-3'}}</td></ng-container><ng-container matColumnDef="deficit"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@rpt.lowStock.deficit">Дефицит</th><td mat-cell *matCellDef="let r"><span class="deficit">{{r.deficit|number:'1.3-3'}}</span></td></ng-container><tr mat-header-row *matHeaderRowDef="cols"></tr><tr mat-row *matRowDef="let r; columns: cols"></tr><tr class="mat-row" *matNoDataRow><td class="mat-cell table-empty" [attr.colspan]="cols.length" i18n="@@common.noData">Нет данных</td></tr></table><mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons/></div></div>
