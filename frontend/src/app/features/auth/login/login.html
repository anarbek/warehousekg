<div class="login-page">
  <div class="login-page__top">
    <app-language-switcher />
  </div>

  <div class="dx-card login-card">
    @if (loading()) {
      <dx-progress-bar [visible]="true" />
    }

    <div class="login-card__header">
      <h2 i18n="@@login.title">Вход в систему</h2>
      <p i18n="@@login.subtitle">Войдите, чтобы продолжить</p>
    </div>

    <div class="login-card__body">
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <dx-text-box
          [(value)]="$any(form.controls.email).value"
          placeholder="Имя пользователя"
          stylingMode="outlined"
          (onValueChanged)="$any(form.controls.email).setValue($event.value)"
        />

        <dx-text-box
          [(value)]="$any(form.controls.password).value"
          mode="password"
          placeholder="Пароль"
          stylingMode="outlined"
          (onValueChanged)="$any(form.controls.password).setValue($event.value)"
        />

        @if (errorMessage()) {
          <p class="login-form__error">{{ errorMessage() }}</p>
        }

        <dx-button
          text="Войти"
          type="default"
          stylingMode="contained"
          [disabled]="loading()"
          (onClick)="submit()"
        />
      </form>

      <div class="login-divider"></div>

      <dx-button
        text="Войти через Google"
        icon="user"
        stylingMode="outlined"
        (onClick)="loginWithGoogle()"
        [disabled]="loading()"
      />
    </div>
  </div>
</div>
