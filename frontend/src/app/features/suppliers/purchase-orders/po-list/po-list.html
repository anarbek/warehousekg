<div class="list-page"><div class="list-page__toolbar"><h1>Заказы поставщикам</h1><dx-button text="Добавить" icon="add" type="default" stylingMode="contained" [routerLink]="['new']"/></div>
@if(loading()){<dx-progress-bar [visible]="true"/>} @if(error()){<p class="list-page__error">{{error()}}</p>}
<dx-data-grid [dataSource]="items()" [showBorders]="true" [hoverStateEnabled]="true" [showColumnLines]="true" [showRowLines]="true">
    <dxi-column dataField="number" caption="Номер" [sortOrder]="'asc'"/><dxi-column dataField="supplierName" caption="Поставщик"/>
    <dxi-column dataField="status" caption="Статус" [width]="120"/>
    <dxi-column dataField="currency" caption="Валюта" [width]="80"/>
    <dxi-column dataField="createdAt" caption="Дата" [width]="160" cellTemplate="dateCell"/>
    <dxi-column dataField="receivedAtUtc" caption="Дата получения" [width]="120" cellTemplate="dateCell"/>
    <dxi-column dataField="totalAmount" caption="Сумма" [width]="120"/>
    <dxi-column caption="" [width]="100" cellTemplate="act"/>
    <div *dxTemplate="let c of 'act'"><a [routerLink]="[c.data.id]"><dx-button icon="info" hint="View" stylingMode="text"/></a></div>
    <div *dxTemplate="let c of 'dateCell'">{{c.value|date:'dd.MM.yyyy, HH:mm'}}</div>
</dx-data-grid></div>
