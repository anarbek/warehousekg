@if(loading()){<dx-progress-bar [visible]="true"/>}
<div class="form-page"><div class="dx-card">@if(saving()){<dx-progress-bar [visible]="true"/>}<div class="form-page__header"><h2>{{title}}</h2></div><div class="form-page__content">@if(err()){<p class="form-page__error">{{err()}}</p>}<dx-form [formData]="formData" [colCount]="2" [items]="formItems"/><div class="form-actions"><dx-button text="Сохранить" type="default" stylingMode="contained" (onClick)="submit()"/><dx-button text="Отмена" stylingMode="outlined" (onClick)="cancel()"/></div></div></div></div>
