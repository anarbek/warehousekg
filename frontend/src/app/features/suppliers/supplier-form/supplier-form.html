<div class="form-page"><mat-card class="form-page__card">@if(saving()){<mat-progress-bar mode="indeterminate"/>}<mat-card-header><mat-card-title>{{title}}</mat-card-title></mat-card-header><mat-card-content>@if(error()){<p class="form-page__error">{{error()}}</p>}<form [formGroup]="form" (ngSubmit)="submit()" class="form-fields">
<mat-form-field appearance="outline"><mat-label i18n="@@sup.form.code">Код</mat-label><input matInput formControlName="code"/>@if(form.controls.code.hasError('required')){<mat-error i18n="@@sup.form.codeReq">Код обязателен</mat-error>}</mat-form-field>
<mat-form-field appearance="outline"><mat-label i18n="@@sup.form.name">Название</mat-label><input matInput formControlName="name"/>@if(form.controls.name.hasError('required')){<mat-error i18n="@@sup.form.nameReq">Название обязательно</mat-error>}</mat-form-field>
<mat-form-field appearance="outline"><mat-label i18n="@@sup.form.contact">Контактное лицо</mat-label><input matInput formControlName="contactName"/></mat-form-field>
<mat-form-field appearance="outline"><mat-label i18n="@@sup.form.email">Email</mat-label><input matInput formControlName="email"/></mat-form-field>
<mat-form-field appearance="outline"><mat-label i18n="@@sup.form.phone">Телефон</mat-label><input matInput formControlName="phone"/></mat-form-field>
<mat-form-field appearance="outline"><mat-label i18n="@@sup.form.address">Адрес</mat-label><input matInput formControlName="address"/></mat-form-field>
<mat-form-field appearance="outline"><mat-label i18n="@@sup.form.taxId">Tax ID</mat-label><input matInput formControlName="taxId"/></mat-form-field>
<mat-checkbox formControlName="isActive" i18n="@@sup.form.active">Активен</mat-checkbox>
<div class="form-actions"><button mat-flat-button color="primary" type="submit" [disabled]="form.invalid||saving()"><span i18n="@@common.save">Сохранить</span></button><button mat-stroked-button type="button" (click)="cancel()"><span i18n="@@common.cancel">Отмена</span></button></div>
</form></mat-card-content></mat-card></div>
