<div class="list-page"><div class="list-page__toolbar"><h1>Поставщики</h1><dx-button text="Добавить" icon="add" type="default" stylingMode="contained" [routerLink]="['new']"/></div>
@if(loading()){<dx-progress-bar [visible]="true"/>} @if(error()){<p class="list-page__error">{{error()}}</p>}
<dx-data-grid [dataSource]="items()" [showBorders]="true" [hoverStateEnabled]="true" [showColumnLines]="true" [showRowLines]="true">
    <dxi-column dataField="code" caption="Код" [sortOrder]="'asc'" />
    <dxi-column dataField="name" caption="Название" />
    <dxi-column dataField="email" caption="Email" />
    <dxi-column dataField="phone" caption="Телефон" />
    <dxi-column dataField="isActive" caption="Статус" [width]="120" cellTemplate="activeCell" />
    <dxi-column caption="" [width]="100" cellTemplate="actionsCell" />
    <div *dxTemplate="let cell of 'activeCell'">{{cell.value?"Активен":"Неактивен"}}</div>
    <div *dxTemplate="let cell of 'actionsCell'"><a [routerLink]="[cell.data.id]"><dx-button icon="info" hint="View" stylingMode="text"/></a><a [routerLink]="[cell.data.id,'edit']"><dx-button icon="edit" hint="Edit" stylingMode="text"/></a></div>
</dx-data-grid></div>
