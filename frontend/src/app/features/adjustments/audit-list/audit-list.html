<div class="list-page"><div class="list-page__toolbar"><h1 i18n="@@aud.list.title">Аудиты</h1></div>@if(loading()){<mat-progress-bar mode="indeterminate" class="list-page__progress"/>}@if(error()){<p class="list-page__error">{{error()}}</p>}<div class="table-container mat-elevation-z2"><table mat-table [dataSource]="ds" matSort><ng-container matColumnDef="number"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@aud.col.number">Номер</th><td mat-cell *matCellDef="let r"><a [routerLink]="[r.id]" class="link">{{r.number}}</a></td></ng-container><ng-container matColumnDef="warehouseId"><th mat-header-cell *matHeaderCellDef i18n="@@aud.col.warehouse">Склад</th><td mat-cell *matCellDef="let r">{{r.warehouseId}}</td></ng-container><ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef i18n="@@aud.col.status">Статус</th><td mat-cell *matCellDef="let r"><span class="badge badge--{{r.status|lowercase}}">{{r.status}}</span></td></ng-container><ng-container matColumnDef="lineCount"><th mat-header-cell *matHeaderCellDef i18n="@@aud.col.lines">Позиций</th><td mat-cell *matCellDef="let r">{{r.lineCount}}</td></ng-container><ng-container matColumnDef="totalVariance"><th mat-header-cell *matHeaderCellDef i18n="@@aud.col.variance">Расхождение</th><td mat-cell *matCellDef="let r"><span [class.neg]="r.totalVariance<0">{{r.totalVariance|number:'1.3-3'}}</span></td></ng-container><ng-container matColumnDef="reconciledAtUtc"><th mat-header-cell *matHeaderCellDef i18n="@@aud.col.date">Дата</th><td mat-cell *matCellDef="let r">{{r.reconciledAtUtc|date:'shortDate'}}</td></ng-container><tr mat-header-row *matHeaderRowDef="cols"></tr><tr mat-row *matRowDef="let r; columns: cols"></tr><tr class="mat-row" *matNoDataRow><td class="mat-cell table-empty" [attr.colspan]="cols.length" i18n="@@common.noData">Нет данных</td></tr></table><mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons/></div></div>
