@if(loading()){<dx-progress-bar [visible]="true"/>}
@if(error()&&!aud()){<div class="detail-page detail-page--error"><p>{{error()}}</p><dx-button text="Назад" icon="arrowleft" stylingMode="outlined" (onClick)="goBack()"/></div>}
@if(aud();as a){
<div class="detail-page">
  <div class="detail-page__toolbar"><dx-button icon="arrowleft" stylingMode="text" (onClick)="goBack()"/><h1 class="detail-page__title">Аудит: {{a.number}}</h1></div>
  <div class="dx-card"><dl class="detail-list">
    <dt>Номер</dt><dd>{{a.number}}</dd>
    <dt>Склад</dt><dd>{{a.warehouseName||a.warehouseId}}</dd>
    <dt>Статус</dt><dd><span class="badge">{{a.status}}</span></dd>
    <dt>Расхождение</dt><dd>{{a.totalVariance|number:'1.3-3'}}</dd>
    @if(a.notes){<dt>Примечание</dt><dd>{{a.notes}}</dd>}
  </dl></div>
  <div class="dx-card"><h3>Сравнение</h3>
    <dx-data-grid [dataSource]="getLines()" [showBorders]="true" [hoverStateEnabled]="true">
      <dxi-column dataField="inventoryItemName" caption="Товар"/>
      <dxi-column dataField="systemQuantity" caption="Система" [width]="120"/>
      <dxi-column dataField="countedQuantity" caption="Факт" [width]="120"/>
      <dxi-column dataField="variance" caption="Отклонение" [width]="120"/>
      <dxi-column dataField="notes" caption="Примечание"/>
    </dx-data-grid>
  </div>
</div>}
