<div class="list-page"><div class="list-page__toolbar"><h1>Ед. измерения</h1><dx-button text="Добавить" icon="add" type="default" stylingMode="contained" [routerLink]="['new']"/></div>
@if(loading()){<dx-progress-bar [visible]="true"/>} @if(error()){<p class="list-page__error">{{error()}}</p>}
<dx-data-grid [dataSource]="items()" [showBorders]="true" [hoverStateEnabled]="true">
<dxi-column dataField="code" caption="Код" [sortOrder]="'asc'"/><dxi-column dataField="name" caption="Название"/>
<dxi-column dataField="isActive" caption="Статус" [width]="120" cellTemplate="ac"/>
<dxi-column caption="" [width]="100" cellTemplate="act"/>
<div *dxTemplate="let c of 'ac'">{{c.value?'Активна':'Неактивна'}}</div>
<div *dxTemplate="let c of 'act'"><a [routerLink]="[c.data.id]"><dx-button icon="info" hint="View" stylingMode="text"/></a><a [routerLink]="[c.data.id,'edit']"><dx-button icon="edit" hint="Edit" stylingMode="text"/></a></div>
</dx-data-grid></div>
