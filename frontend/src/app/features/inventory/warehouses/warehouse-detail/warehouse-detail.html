@if (loading()) { <dx-progress-bar [visible]="true" /> }
@if (error()) { <div class="detail-page detail-page--error"><p>{{ error() }}</p><dx-button text="Назад" icon="arrowleft" stylingMode="outlined" [routerLink]="['../..']" /></div> }
@if (warehouse(); as wh) {
  <div class="detail-page">
    <div class="detail-page__toolbar">
      <dx-button icon="arrowleft" stylingMode="text" [routerLink]="['../..']" />
      <h1 class="detail-page__title" i18n="@@warehouse.detail.title">Детали склада</h1>
      <span class="detail-page__spacer"></span>
      <dx-button text="Редактировать" icon="edit" stylingMode="outlined" [routerLink]="['edit']" />
      <dx-button text="Удалить" icon="trash" stylingMode="outlined" type="danger" (onClick)="delete()" />
    </div>
    <div class="dx-card">
      <dl class="detail-list">
        <dt i18n="@@warehouse.column.code">Код</dt><dd>{{ wh.code }}</dd>
        <dt i18n="@@warehouse.column.name">Название</dt><dd>{{ wh.name }}</dd>
        <dt i18n="@@warehouse.column.address">Адрес</dt><dd>{{ wh.address || '—' }}</dd>
        <dt i18n="@@warehouse.column.status">Статус</dt><dd>{{ wh.isActive ? 'Активен' : 'Неактивен' }}</dd>
      </dl>
    </div>
  </div>
}
