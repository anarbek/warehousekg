@if (loading()) { <dx-progress-bar [visible]="true" /> }
@if (error()) { <div class="detail-page detail-page--error"><p>{{ error() }}</p><dx-button text="Назад" icon="arrowleft" stylingMode="outlined" [routerLink]="['../..']" /></div> }
@if (warehouse(); as wh) {
  <div class="detail-page">
    <div class="detail-page__toolbar">
      <dx-button icon="arrowleft" stylingMode="text" [routerLink]="['../..']" />
      <h1 class="detail-page__title" i18n="@@warehouse.detail.title">Детали склада</h1>
      <span class="detail-page__spacer"></span>
      <dx-button text="Редактировать" icon="edit" stylingMode="outlined" [routerLink]="['edit']" />
      <dx-button text="Удалить" icon="trash" stylingMode="outlined" type="danger" (onClick)="delete()" />
    </div>
    <div class="dx-card">
      <dl class="detail-list">
        <dt i18n="@@warehouse.column.code">Код</dt><dd>{{ wh.code }}</dd>
        <dt i18n="@@warehouse.column.name">Название</dt><dd>{{ wh.name }}</dd>
        <dt i18n="@@warehouse.column.address">Адрес</dt><dd>{{ wh.address || '—' }}</dd>
        <dt i18n="@@warehouse.column.status">Статус</dt><dd>{{ wh.isActive ? 'Активен' : 'Неактивен' }}</dd>
      </dl>
    </div>

    <div class="dx-card">
      <h3 i18n="@@warehouse.detail.items">Товары на складе</h3>
      <dx-data-grid [dataSource]="items()" [showBorders]="true" [hoverStateEnabled]="true" [showColumnLines]="true" [showRowLines]="true">
        <dxi-column dataField="sku" i18n-caption="@@item.column.sku" caption="Артикул" [width]="120" />
        <dxi-column dataField="name" i18n-caption="@@item.column.name" caption="Название" />
        <dxi-column dataField="categoryName" i18n-caption="@@item.column.category" caption="Категория" [width]="140" />
        <dxi-column dataField="barcode" i18n-caption="@@item.column.barcode" caption="Штрихкод" [width]="140" />
        <dxi-column dataField="quantityOnHand" i18n-caption="@@item.column.qty" caption="Кол-во" [width]="80" format="#,##0.###" />
        <dxi-column dataField="reorderLevel" i18n-caption="@@item.column.reorder" caption="Мин. запас" [width]="100" format="#,##0.###" />
        <dxi-column dataField="isActive" i18n-caption="@@item.column.status" caption="Статус" [width]="100" cellTemplate="activeCell" />
        <div *dxTemplate="let c of 'activeCell'">{{ c.value ? 'Активен' : 'Неактивен' }}</div>
      </dx-data-grid>
    </div>
  </div>
}
