<div class="list-page">
  <div class="list-page__toolbar">
    <h1 i18n="@@warehouse.list.title">Склады</h1>
    <button mat-flat-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon>
      <span i18n="@@warehouse.list.add">Добавить склад</span>
    </button>
  </div>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" class="list-page__progress" />
  }

  @if (error()) {
    <p class="list-page__error">{{ error() }}</p>
  }

  <div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@warehouse.column.code">Код</th>
        <td mat-cell *matCellDef="let row">{{ row.code }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@warehouse.column.name">Название</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef i18n="@@warehouse.column.address">Адрес</th>
        <td mat-cell *matCellDef="let row">{{ row.address }}</td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@warehouse.column.status">Статус</th>
        <td mat-cell *matCellDef="let row">
          @if (row.isActive) {
            <mat-icon class="status-icon status-icon--active">check_circle</mat-icon>
          } @else {
            <mat-icon class="status-icon status-icon--inactive">cancel</mat-icon>
          }
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef i18n="@@common.actions">Действия</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [routerLink]="[row.id]" [matTooltip]="detailLabel">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button [routerLink]="[row.id, 'edit']" [matTooltip]="editLabel">
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="deleteWarehouse(row.id)"
            [matTooltip]="deleteLabel"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell table-empty" [attr.colspan]="displayedColumns.length" i18n="@@common.noData">
          Нет данных
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
</div>
