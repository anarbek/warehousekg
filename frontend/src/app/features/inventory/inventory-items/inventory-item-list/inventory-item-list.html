<div class="list-page">
  <div class="list-page__toolbar">
    <h1 i18n="@@inventory.list.title">Товары</h1>
    <dx-button text="Добавить товар" icon="add" type="default" stylingMode="contained" [routerLink]="['new']" />
  </div>
  @if (loading()) { <dx-progress-bar [visible]="true" /> }
  @if (error()) { <p class="list-page__error">{{ error() }}</p> }
  <dx-data-grid [dataSource]="items()" [showBorders]="true" [allowColumnResizing]="true" [hoverStateEnabled]="true" [showColumnLines]="true" [showRowLines]="true">
    <dxi-column dataField="sku" caption="SKU" [sortOrder]="'asc'" />
    <dxi-column dataField="name" caption="Название" />
    <dxi-column dataField="categoryName" caption="Категория" />
    <dxi-column dataField="unitOfMeasureName" caption="Ед. изм." [width]="100" />
    <dxi-column dataField="quantityOnHand" caption="На складе" [width]="100" />
    <dxi-column dataField="reorderLevel" caption="Мин. остаток" [width]="100" />
    <dxi-column dataField="isActive" caption="Статус" [width]="120" cellTemplate="activeCell" />
    <dxi-column caption="" [width]="100" cellTemplate="actionsCell" />
    <div *dxTemplate="let cell of 'activeCell'">{{ cell.value ? 'Активен' : 'Неактивен' }}</div>
    <div *dxTemplate="let cell of 'actionsCell'">
      <a [routerLink]="[cell.data.id]"><dx-button icon="info" hint="View" stylingMode="text" /></a>
      <a [routerLink]="[cell.data.id, 'edit']"><dx-button icon="edit" hint="Edit" stylingMode="text" /></a>
    </div>
  </dx-data-grid>
</div>
