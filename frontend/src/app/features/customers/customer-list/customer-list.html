<div class="list-page"><div class="list-page__toolbar"><h1 i18n="@@cust.list.title">Клиенты</h1><button mat-flat-button color="primary" routerLink="new"><mat-icon>add</mat-icon><span i18n="@@cust.list.add">Добавить клиента</span></button></div>@if(loading()){<mat-progress-bar mode="indeterminate" class="list-page__progress"/>}@if(error()){<p class="list-page__error">{{error()}}</p>}<div class="table-container mat-elevation-z2"><table mat-table [dataSource]="dataSource" matSort><ng-container matColumnDef="code"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@cust.col.code">Код</th><td mat-cell *matCellDef="let r">{{r.code}}</td></ng-container><ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@cust.col.name">Название</th><td mat-cell *matCellDef="let r">{{r.name}}</td></ng-container><ng-container matColumnDef="contactName"><th mat-header-cell *matHeaderCellDef i18n="@@cust.col.contact">Контакт</th><td mat-cell *matCellDef="let r">{{r.contactName||'—'}}</td></ng-container><ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef i18n="@@cust.col.email">Email</th><td mat-cell *matCellDef="let r">{{r.email||'—'}}</td></ng-container><ng-container matColumnDef="isActive"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@cust.col.status">Статус</th><td mat-cell *matCellDef="let r">@if(r.isActive){<mat-icon class="a">check_circle</mat-icon>}@else{<mat-icon class="i">cancel</mat-icon>}</td></ng-container><ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef i18n="@@common.actions">Действия</th><td mat-cell *matCellDef="let r"><button mat-icon-button [routerLink]="[r.id,'edit']"><mat-icon>edit</mat-icon></button><button mat-icon-button color="warn" (click)="del(r.id)"><mat-icon>delete</mat-icon></button></td></ng-container><tr mat-header-row *matHeaderRowDef="displayedColumns"></tr><tr mat-row *matRowDef="let r; columns: displayedColumns"></tr><tr class="mat-row" *matNoDataRow><td class="mat-cell table-empty" [attr.colspan]="displayedColumns.length" i18n="@@common.noData">Нет данных</td></tr></table><mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons/></div></div>
