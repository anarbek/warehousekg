<div class="list-page"><div class="list-page__toolbar"><h1 i18n="@@so.list.title">Заказы клиентов</h1><button mat-flat-button color="primary" routerLink="new"><mat-icon>add</mat-icon><span i18n="@@so.list.add">Новый заказ</span></button></div>@if(loading()){<mat-progress-bar mode="indeterminate" class="list-page__progress"/>}@if(error()){<p class="list-page__error">{{error()}}</p>}<div class="table-container mat-elevation-z2"><table mat-table [dataSource]="ds" matSort><ng-container matColumnDef="number"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@so.col.number">Номер</th><td mat-cell *matCellDef="let r"><a [routerLink]="[r.id]" class="link">{{r.number}}</a></td></ng-container><ng-container matColumnDef="customerId"><th mat-header-cell *matHeaderCellDef i18n="@@so.col.customer">Клиент</th><td mat-cell *matCellDef="let r">{{r.customerName||r.customerId}}</td></ng-container><ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@so.col.status">Статус</th><td mat-cell *matCellDef="let r"><span class="badge badge--{{r.status|lowercase}}">{{r.status}}</span></td></ng-container><ng-container matColumnDef="totalAmount"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@so.col.total">Сумма</th><td mat-cell *matCellDef="let r">{{r.totalAmount|number:'1.2-2'}} {{r.currency}}</td></ng-container><ng-container matColumnDef="lineCount"><th mat-header-cell *matHeaderCellDef i18n="@@so.col.lines">Позиций</th><td mat-cell *matCellDef="let r">{{r.lineCount}}</td></ng-container><ng-container matColumnDef="orderDateUtc"><th mat-header-cell *matHeaderCellDef mat-sort-header i18n="@@so.col.date">Дата</th><td mat-cell *matCellDef="let r">{{r.orderDateUtc|date:'shortDate'}}</td></ng-container><ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef i18n="@@common.actions">Действия</th><td mat-cell *matCellDef="let r"><button mat-icon-button [routerLink]="[r.id]"><mat-icon>visibility</mat-icon></button></td></ng-container><tr mat-header-row *matHeaderRowDef="displayedColumns"></tr><tr mat-row *matRowDef="let r; columns: displayedColumns"></tr><tr class="mat-row" *matNoDataRow><td class="mat-cell table-empty" [attr.colspan]="displayedColumns.length" i18n="@@common.noData">Нет данных</td></tr></table><mat-paginator [pageSizeOptions]="[10,25,50]" showFirstLastButtons/></div></div>
