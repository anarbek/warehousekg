<app-header (menuToggle)="toggleSidenav()" (logout)="logout()" />

<dx-drawer
  class="shell-container"
  [opened]="sidenavOpen()"
  [openedStateMode]="'shrink'"
  [revealMode]="'slide'"
  [minSize]="40"
  [maxSize]="240"
  template="sidenav"
  height="calc(100vh - 48px)"
>
  <div *dxTemplate="let _ of 'sidenav'" class="shell-sidenav">
    <app-sidenav />
  </div>

  <div class="shell-content">
    <router-outlet />
  </div>
</dx-drawer>
