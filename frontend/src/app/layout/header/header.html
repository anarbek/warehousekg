<dx-toolbar class="app-header">
  <dxi-item location="before">
    <dx-button icon="menu" stylingMode="text" (onClick)="menuToggle.emit()" />
  </dxi-item>
  <dxi-item location="before">
    <span class="app-header__title" i18n="@@app.title">WarehouseKG</span>
  </dxi-item>
  <dxi-item location="after">
    <app-language-switcher />
  </dxi-item>
  <dxi-item location="after">
    <dx-button icon="runner" stylingMode="text" hint="Выйти" (onClick)="logout.emit()" />
  </dxi-item>
</dx-toolbar>
